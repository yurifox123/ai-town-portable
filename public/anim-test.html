<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精灵动画测试 - AI 生态小镇</title>
  <link rel="stylesheet" href="css/sprite-crop-tool.css">
  <style>
    .test-header { background: #1a1a2e; }
    .test-main { max-width: 900px; margin: 0 auto; padding: 30px; }
    .test-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
    .test-card {
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .test-card h3 { font-size: 14px; color: #667eea; margin-bottom: 10px; }
    .test-canvas-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 12px;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .test-canvas-wrap canvas { image-rendering: pixelated; }
    .test-controls { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .test-btn {
      padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,23,42,0.8); color: #ccc; cursor: pointer; font-size: 12px;
    }
    .test-btn.active { border-color: #667eea; color: #667eea; background: rgba(102,126,234,0.15); }
    .test-status { font-size: 11px; color: #888; margin-top: 8px; }
    .global-controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .global-label { color: #aaa; font-size: 14px; }
    .test-error { color: #ef476f; font-size: 12px; }
  </style>
</head>
<body>
  <header class="header test-header">
    <div class="header-left">
      <a href="/" class="btn-back">← 返回小镇</a>
      <h1>精灵动画测试</h1>
    </div>
  </header>

  <main class="test-main">
    <div class="global-controls">
      <span class="global-label">角色:</span>
      <select id="char-select" class="test-btn"></select>
      <span class="global-label">帧速:</span>
      <select id="fps-select" class="test-btn">
        <option value="3">3 FPS</option>
        <option value="4" selected>4 FPS</option>
        <option value="6">6 FPS</option>
        <option value="8">8 FPS</option>
        <option value="10">10 FPS</option>
      </select>
    </div>

    <div class="test-grid" id="test-grid"></div>
  </main>

  <script type="module" src="js/tools/anim-test.js"></script>
</body>
</html>
