<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建筑编辑器 - AI生态小镇</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="building-editor-app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-left">
        <h1>🏗️ 建筑编辑器</h1>
      </div>
      <div class="header-center">
        <span class="editor-mode">设计模式</span>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn btn-small">🏘️ 返回小镇</a>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="editor-main">
      <!-- 左侧工具面板 -->
      <aside class="editor-sidebar left-sidebar">
        <!-- 建筑列表 -->
        <div class="panel">
          <div class="panel-header">
            <h3>📋 建筑列表</h3>
            <button id="btn-add-building" class="btn btn-small btn-primary">➕ 新建</button>
          </div>
          <div id="building-list" class="building-list">
            <div class="empty-state">暂无建筑，点击新建添加</div>
          </div>
        </div>

        <!-- 导入/导出 -->
        <div class="panel">
          <div class="panel-header">
            <h3>💾 数据</h3>
          </div>
          <div class="panel-body">
            <button id="btn-export" class="btn btn-block">📤 导出配置</button>
            <button id="btn-import" class="btn btn-block">📥 导入配置</button>
            <input type="file" id="import-file" accept=".json" hidden>
          </div>
        </div>
      </aside>

      <!-- 中央编辑区 -->
      <section class="editor-canvas-section">
        <div class="canvas-container">
          <canvas id="editor-canvas"></canvas>
          <div id="editor-tooltip" class="tooltip hidden"></div>
        </div>
        <div class="canvas-controls">
          <button id="btn-grid" class="btn btn-small active">⊞ 网格</button>
          <button id="btn-zoom-in" class="btn btn-small">🔍+</button>
          <button id="btn-zoom-out" class="btn btn-small">🔍-</button>
          <button id="btn-reset-view" class="btn btn-small">⟲ 重置</button>
        </div>
      </section>

      <!-- 右侧属性面板 -->
      <aside class="editor-sidebar right-sidebar">
        <!-- 当前选中建筑的属性 -->
        <div class="panel" id="properties-panel">
          <div class="panel-header">
            <h3>🎨 属性设置</h3>
          </div>
          <div class="panel-body" id="properties-content">
            <div class="empty-state">在画布上选择建筑进行编辑</div>
          </div>
        </div>

        <!-- 预览信息 -->
        <div class="panel">
          <div class="panel-header">
            <h3>👁️ 预览</h3>
          </div>
          <div class="panel-body">
            <div id="preview-info">
              <p>网格大小: <span id="grid-size">16px</span></p>
              <p>画布尺寸: <span id="canvas-size">50×50</span></p>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <!-- 新建建筑弹窗 -->
    <div id="new-building-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>➕ 新建建筑</h2>
          <button class="btn-close" id="btn-close-new-building">×</button>
        </div>
        <div class="modal-body">
          <form id="new-building-form">
            <div class="form-group">
              <label for="building-id">ID (唯一标识)</label>
              <input type="text" id="building-id" required placeholder="如: shop, library">
            </div>
            <div class="form-group">
              <label for="building-name">显示名称</label>
              <input type="text" id="building-name" required placeholder="如: 便利店">
            </div>
            <div class="form-group">
              <label for="building-image">贴图</label>
              <div class="image-upload-area" id="image-upload-area">
                <input type="file" id="building-image" accept="image/png,image/jpg,image/jpeg,image/webp" hidden>
                <div class="upload-placeholder">
                  <span class="upload-icon">🖼️</span>
                  <span>点击或拖拽上传图片</span>
                  <span class="upload-hint">支持 PNG, JPG, WEBP</span>
                </div>
                <img id="image-preview" class="image-preview hidden" alt="预览">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label for="building-width">宽度 (格)</label>
                <input type="number" id="building-width" min="1" max="10" value="3">
              </div>
              <div class="form-group half">
                <label for="building-height">高度 (格)</label>
                <input type="number" id="building-height" min="1" max="10" value="3">
              </div>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="building-obstacle" checked>
                <span>🔒 作为障碍物（人物无法通过）</span>
              </label>
            </div>
            <div class="form-group">
              <label for="building-description">描述</label>
              <textarea id="building-description" rows="2" placeholder="建筑描述..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">创建建筑</button>
              <button type="button" class="btn btn-secondary" id="btn-cancel-new-building">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- 编辑建筑弹窗 -->
    <div id="edit-building-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>✏️ 编辑建筑</h2>
          <button class="btn-close" id="btn-close-edit-building">×</button>
        </div>
        <div class="modal-body">
          <form id="edit-building-form">
            <input type="hidden" id="edit-building-original-id">
            <div class="form-group">
              <label for="edit-building-id">ID</label>
              <input type="text" id="edit-building-id" required>
            </div>
            <div class="form-group">
              <label for="edit-building-name">显示名称</label>
              <input type="text" id="edit-building-name" required>
            </div>
            <div class="form-group">
              <label>当前贴图</label>
              <div class="image-upload-area" id="edit-image-upload-area">
                <input type="file" id="edit-building-image" accept="image/png,image/jpg,image/jpeg,image/webp" hidden>
                <img id="edit-image-preview" class="image-preview" alt="预览">
                <button type="button" class="btn btn-small btn-change-image">更换图片</button>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label for="edit-building-width">宽度 (格)</label>
                <input type="number" id="edit-building-width" min="1" max="10" value="3">
              </div>
              <div class="form-group half">
                <label for="edit-building-height">高度 (格)</label>
                <input type="number" id="edit-building-height" min="1" max="10" value="3">
              </div>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="edit-building-obstacle">
                <span>🔒 作为障碍物（人物无法通过）</span>
              </label>
            </div>
            <div class="form-group">
              <label for="edit-building-description">描述</label>
              <textarea id="edit-building-description" rows="2"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存修改</button>
              <button type="button" class="btn btn-danger" id="btn-delete-building">🗑️ 删除</button>
              <button type="button" class="btn btn-secondary" id="btn-cancel-edit-building">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/editor/building-editor.js"></script>
</body>
</html>
